<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Login & Signup Form | CodingNepal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body{
        background: linear-gradient(to right, #0f172a, #2563eb);
      }
      ::selection{
        background: #2563eb;
        color: #fff;
      }
      .title-text, .form-inner{
        transition: all 0.6s cubic-bezier(0.68,-0.55,0.265,1.55);
      }
      .slider-tab{
        transition: all 0.6s cubic-bezier(0.68,-0.55,0.265,1.55);
      }
      .btn-layer{
        transition: all 0.4s ease;
      }
      .btn:hover .btn-layer{
        left: 0;
      }
      input[type="radio"]{
        display: none;
      }
      #signup:checked ~ .slider-tab{
        left: 50%;
      }
      #signup:checked ~ label.signup-label{
        color: #fff;
        cursor: default;
        user-select: none;
      }
      #signup:checked ~ label.login-label{
        color: #000;
      }
      #login:checked ~ label.signup-label{
        color: #000;
      }
      #login:checked ~ label.login-label{
        cursor: default;
        user-select: none;
      }
    </style>
  </head>
  <body class="grid place-items-center h-full w-full min-h-screen font-['Poppins',sans-serif]">
    <div class="wrapper overflow-hidden max-w-[390px] bg-white p-[30px] rounded-[5px] shadow-[0px_15px_20px_rgba(0,0,0,0.1)]">
      <div class="title-text flex w-[200%]">
        <div class="title login-title w-1/2 text-[35px] font-semibold text-center">Login Form</div>
        <div class="title signup-title w-1/2 text-[35px] font-semibold text-center">Signup Form</div>
      </div>
      <div class="form-container w-full overflow-hidden">
        <div class="slide-controls relative flex h-[50px] w-full overflow-hidden my-[30px] mt-[30px] mb-[10px] justify-between border border-[lightgrey] rounded-[5px]">
          <input type="radio" name="slide" id="login" checked>
          <input type="radio" name="slide" id="signup">
          <label for="login" class="login-label slide h-full w-full text-white text-[18px] font-medium text-center leading-[48px] cursor-pointer z-[1] transition-all duration-[600ms] ease-in-out">Login</label>
          <label for="signup" class="signup-label slide h-full w-full text-black text-[18px] font-medium text-center leading-[48px] cursor-pointer z-[1] transition-all duration-[600ms] ease-in-out">Signup</label>
          <div class="slider-tab absolute h-full w-1/2 left-0 z-0 rounded-[5px]" style="background: linear-gradient(to right, #0f172a, #2563eb);"></div>
        </div>
        <div class="form-inner flex w-[200%]">
          <form action="#" class="login w-1/2">
            <div class="field h-[50px] w-full mt-[20px]">
              <input type="text" placeholder="Email Address" required
                class="h-full w-full outline-none pl-[15px] rounded-[5px] border border-[lightgrey] border-b-2 text-[17px] transition-all duration-300 ease-in-out focus:border-[#3b82f6] placeholder:text-[#999] focus:placeholder:text-[#b3b3b3]">
            </div>
            <div class="field h-[50px] w-full mt-[20px]">
              <input type="password" placeholder="Password" required
                class="h-full w-full outline-none pl-[15px] rounded-[5px] border border-[lightgrey] border-b-2 text-[17px] transition-all duration-300 ease-in-out focus:border-[#3b82f6] placeholder:text-[#999] focus:placeholder:text-[#b3b3b3]">
            </div>
            <div class="pass-link mt-[5px]"><a href="forgot-password.html" class="text-[#2563eb] no-underline hover:underline">Forgot password?</a></div>
            <div class="field btn h-[50px] w-full rounded-[5px] relative overflow-hidden mt-[20px]">
              <div class="btn-layer h-full w-[300%] absolute left-[-100%] rounded-[5px]" style="background: linear-gradient(to right, #0f172a, #2563eb, #0f172a, #2563eb);"></div>
              <input type="submit" value="Login"
                class="h-full w-full z-[1] relative bg-transparent border-none text-white pl-0 rounded-[5px] text-[20px] font-medium cursor-pointer">
            </div>
            <div class="signup-link text-center mt-[30px]">Not a member? <a href="" class="signup-link-anchor text-[#2563eb] no-underline hover:underline">Signup now</a></div>
          </form>
          <form action="#" class="signup w-1/2">
            <div class="field h-[50px] w-full mt-[20px]">
              <input type="text" placeholder="Email Address" required
                class="h-full w-full outline-none pl-[15px] rounded-[5px] border border-[lightgrey] border-b-2 text-[17px] transition-all duration-300 ease-in-out focus:border-[#3b82f6] placeholder:text-[#999] focus:placeholder:text-[#b3b3b3]">
            </div>
            <div class="field h-[50px] w-full mt-[20px]">
              <input type="password" placeholder="Password" required
                class="h-full w-full outline-none pl-[15px] rounded-[5px] border border-[lightgrey] border-b-2 text-[17px] transition-all duration-300 ease-in-out focus:border-[#3b82f6] placeholder:text-[#999] focus:placeholder:text-[#b3b3b3]">
            </div>
            <div class="field h-[50px] w-full mt-[20px]">
              <input type="password" placeholder="Confirm password" required
                class="h-full w-full outline-none pl-[15px] rounded-[5px] border border-[lightgrey] border-b-2 text-[17px] transition-all duration-300 ease-in-out focus:border-[#3b82f6] placeholder:text-[#999] focus:placeholder:text-[#b3b3b3]">
            </div>
            <div class="field btn h-[50px] w-full rounded-[5px] relative overflow-hidden mt-[20px]">
              <div class="btn-layer h-full w-[300%] absolute left-[-100%] rounded-[5px]" style="background: linear-gradient(to right, #0f172a, #2563eb, #0f172a, #2563eb);"></div>
              <input type="submit" value="Signup"
                class="h-full w-full z-[1] relative bg-transparent border-none text-white pl-0 rounded-[5px] text-[20px] font-medium cursor-pointer">
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      const loginText = document.querySelector(".title-text .login-title");
      const loginForm = document.querySelector("form.login");
      const loginBtn = document.querySelector("label.login-label");
      const signupBtn = document.querySelector("label.signup-label");
      const signupLink = document.querySelector("form .signup-link-anchor");
      signupBtn.onclick = (()=>{
        loginForm.style.marginLeft = "-50%";
        loginText.style.marginLeft = "-50%";
      });
      loginBtn.onclick = (()=>{
        loginForm.style.marginLeft = "0%";
        loginText.style.marginLeft = "0%";
      });
      signupLink.onclick = (()=>{
        signupBtn.click();
        return false;
      });
    </script>
  </body>
</html>
