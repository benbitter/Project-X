<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body{
        background: linear-gradient(to right, #0f172a, #2563eb);
      }
      ::selection{
        background: #2563eb;
        color: #fff;
      }
      .btn-layer{
        transition: all 0.4s ease;
      }
      .btn:hover .btn-layer{
        left: 0;
      }
    </style>
  </head>
  <body class="grid place-items-center h-full w-full min-h-screen font-['Poppins',sans-serif]">
    <div class="wrapper overflow-hidden max-w-[390px] w-full bg-white p-[30px] rounded-[5px] shadow-[0px_15px_20px_rgba(0,0,0,0.1)]">

      <!-- STEP 1: enter email -->
      <div id="step-email">
        <div class="title text-[28px] font-semibold text-center mb-[10px]">Forgot Password?</div>
        <p class="text-center text-[#666] text-[14px] mb-[25px]">Enter your registered email and we'll send you a link to reset your password.</p>
        <form id="email-form">
          <div class="field h-[50px] w-full mt-[20px]">
            <input type="email" id="email-input" placeholder="Email Address" required
              class="h-full w-full outline-none pl-[15px] rounded-[5px] border border-[lightgrey] border-b-2 text-[17px] transition-all duration-300 ease-in-out focus:border-[#3b82f6] placeholder:text-[#999] focus:placeholder:text-[#b3b3b3]">
          </div>
          <div class="field btn h-[50px] w-full rounded-[5px] relative overflow-hidden mt-[25px]">
            <div class="btn-layer h-full w-[300%] absolute left-[-100%] rounded-[5px]" style="background: linear-gradient(to right, #0f172a, #2563eb, #0f172a, #2563eb);"></div>
            <input type="submit" value="Send Reset Link"
              class="h-full w-full z-[1] relative bg-transparent border-none text-white pl-0 rounded-[5px] text-[18px] font-medium cursor-pointer">
          </div>
        </form>
        <div class="text-center mt-[25px] text-[14px]">
          <a href="login-signup-tailwind (1).html" class="text-[#2563eb] no-underline hover:underline">Back to Login</a>
        </div>
      </div>

      <!-- STEP 2: confirmation -->
      <div id="step-sent" class="hidden text-center">
        <div class="mb-[20px] flex justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14 text-[#2563eb]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
          </svg>
        </div>
        <div class="title text-[24px] font-semibold mb-[10px]">Check your email</div>
        <p class="text-[#666] text-[14px] mb-[20px]">If an account exists for <span id="sent-email" class="font-medium text-black"></span>, a password reset link has been sent. The link expires in 30 minutes.</p>
        <div class="text-center mt-[15px] text-[14px]">
          <a href="index.html" class="text-[#2563eb] no-underline hover:underline">Back to Login</a>
        </div>
      </div>

    </div>

    <script>
      const emailForm = document.getElementById('email-form');
      const stepEmail = document.getElementById('step-email');
      const stepSent = document.getElementById('step-sent');
      const emailInput = document.getElementById('email-input');
      const sentEmail = document.getElementById('sent-email');

      emailForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = emailInput.value;

        // TODO: replace with your real backend call, e.g.:
        // await fetch('/api/forgot-password', {
        //   method: 'POST',
        //   headers: { 'Content-Type': 'application/json' },
        //   body: JSON.stringify({ email })
        // });

        sentEmail.textContent = email;
        stepEmail.classList.add('hidden');
        stepSent.classList.remove('hidden');
      });
    </script>
  </body>
</html>
